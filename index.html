<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ether</title>
<link rel="shortcut icon" type="lab-icon" href="https://res.cloudinary.com/dio49rnxg/image/upload/v1746520710/ether_icon_48x48_r4f81l.png">
<link rel="stylesheet" href="styles.css">
<script src="scripts.js"></script>
<style>
  .name-row {
    display: flex;
    gap: 0.5rem;
  }

  .name-row .email-input {
    width: 50%;
  }

  #form-status {
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-align: center;
    margin-top: 0.5rem;
    min-height: 1rem;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 300;
  }

  #form-status.error {
    color: rgba(255, 80, 80, 0.8);
  }
</style>
</head>
<body>
<div class="container">
  <img 
    src="https://res.cloudinary.com/dio49rnxg/image/upload/v1747799877/ether_logo_white_transparent_ypy0dw.png" 
    alt="ether" 
    class="logo"
  >
  <div class="email-section">
    <h2 class="email-heading">stay updated for what's next.</h2>
    <form class="email-form" id="email-form" novalidate>
      <div class="name-row">
        <input 
          type="text" 
          name="fi-sender-firstName" 
          class="email-input" 
          placeholder="first name"
          required
        >
        <input 
          type="text" 
          name="fi-sender-lastName" 
          class="email-input" 
          placeholder="last name"
          required
        >
      </div>
      <input 
        type="email" 
        name="fi-sender-email" 
        class="email-input" 
        placeholder="enter your email"
        required
      >
      <button type="submit" class="submit-btn" id="submit-btn">subscribe</button>
    </form>
    <p id="form-status"></p>
  </div>
</div>

<script src="https://forminit.com/sdk/v1/forminit.js"></script>
<script>
  const forminit = new Forminit();
  const form = document.getElementById('email-form');
  const submitBtn = document.getElementById('submit-btn');
  const statusEl = document.getElementById('form-status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = 'subscribing...';
    statusEl.textContent = '';
    statusEl.className = '';

    const { data, error } = await forminit.submit('x0vsqxq07e6', new FormData(form));

    if (error) {
      statusEl.textContent = error.message || 'something went wrong. please try again.';
      statusEl.className = 'error';
      submitBtn.disabled = false;
      submitBtn.textContent = 'subscribe';
      return;
    }

    statusEl.textContent = "you're on the list.";
    form.reset();
    submitBtn.disabled = false;
    submitBtn.textContent = 'subscribe';
  });
</script>
</body>
</html>
